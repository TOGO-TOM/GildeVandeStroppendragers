<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <h1>API Connection Test</h1>
    
    <div class="section">
        <h2>Quick Tests</h2>
        <button onclick="testAPI()">Test API Connection</button>
        <button onclick="testDebug()">Test Debug Endpoint</button>
        <button onclick="testMembers()">Get Members</button>
        <button onclick="addTestMember()">Add Test Member</button>
    </div>

    <div class="section">
        <h2>Results:</h2>
        <div id="results"></div>
    </div>

    <script>
        const API_URL = '/api/members';

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            results.innerHTML += `<div class="${className}">${new Date().toLocaleTimeString()}: ${message}</div>`;
        }

        function logJSON(obj) {
            const results = document.getElementById('results');
            results.innerHTML += `<pre>${JSON.stringify(obj, null, 2)}</pre>`;
        }

        async function testAPI() {
            log('Testing API connection to: ' + API_URL);
            try {
                const response = await fetch(API_URL);
                log(`Response status: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Received ${data.length} members`, 'success');
                    logJSON(data);
                } else {
                    const text = await response.text();
                    log(`Error response: ${text}`, 'error');
                }
            } catch (error) {
                log(`FAILED: ${error.message}`, 'error');
                log('Make sure the application is running (Press F5 in Visual Studio)', 'error');
            }
        }

        async function testDebug() {
            log('Testing debug endpoint...');
            try {
                const response = await fetch(API_URL + '/debug');
                const data = await response.json();
                logJSON(data);
                
                if (data.databaseConnected) {
                    log('Database is connected!', 'success');
                    log(`Found ${data.memberCount} members in database`, 'success');
                } else {
                    log('Database connection failed!', 'error');
                }
            } catch (error) {
                log(`FAILED: ${error.message}`, 'error');
            }
        }

        async function testMembers() {
            log('Fetching all members...');
            try {
                const response = await fetch(API_URL);
                const members = await response.json();
                
                if (members.length === 0) {
                    log('No members in database (empty array)', 'success');
                } else {
                    log(`Found ${members.length} members:`, 'success');
                    members.forEach((m, i) => {
                        log(`${i + 1}. ${m.firstName} ${m.lastName} (${m.memberNumber})`, 'success');
                    });
                    logJSON(members);
                }
            } catch (error) {
                log(`FAILED: ${error.message}`, 'error');
            }
        }

        async function addTestMember() {
            log('Adding test member...');
            
            const testMember = {
                memberNumber: 'TEST' + Date.now(),
                firstName: 'Test',
                lastName: 'User',
                email: 'test@example.com',
                phoneNumber: '+1-555-0001',
                isAlive: true,
                address: {
                    street: '123 Test Street',
                    city: 'Test City',
                    postalCode: '12345',
                    country: 'Test Country'
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testMember)
                });

                if (response.ok) {
                    const created = await response.json();
                    log('Test member created successfully!', 'success');
                    logJSON(created);
                } else {
                    const error = await response.json();
                    log(`Failed to create member: ${error.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log(`FAILED: ${error.message}`, 'error');
            }
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            log('Page loaded. Click buttons above to run tests.');
            log('Current URL: ' + window.location.href);
            log('API URL: ' + API_URL);
        });
    </script>
</body>
</html>
