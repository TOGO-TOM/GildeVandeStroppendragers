<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Member Administration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            background: linear-gradient(135deg, #000 0%, #333 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: #ccc;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-login:hover {
            background: #333;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c62828;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-footer {
            padding: 20px 30px;
            background: #f9f9f9;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }

        .login-footer p {
            font-size: 13px;
            color: #666;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            color: #666;
        }

        .password-toggle-btn:hover {
            color: #000;
        }
    </style>
</head>
<body style="opacity: 0; transition: opacity 0.3s;">
    <div class="login-container">
        <div class="login-header">
            <h1>&#128101; Member Administration</h1>
            <p>Sign in to your account</p>
        </div>

        <div class="login-body">
            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username"
                        autocomplete="username"
                        placeholder="Enter your username"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            autocomplete="current-password"
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle-btn" onclick="togglePassword()">
                            <span id="toggleIcon">&#128065;</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Signing in...</p>
            </div>
        </div>

        <div class="login-footer">
            <p>Gilde Van De Stroppendragers</p>
        </div>
    </div>

    <script>
        const apiUrl = '/api';

        // Prevent redirect loop - only check once on page load
        (function checkExistingAuth() {
            try {
                const authToken = localStorage.getItem('authToken');
                const currentUser = localStorage.getItem('currentUser');
                const loginTime = localStorage.getItem('loginTime');
                
                if (authToken && currentUser) {
                    // Check if session has expired
                    if (loginTime) {
                        const loginDate = new Date(loginTime);
                        const now = new Date();
                        const timeSinceLogin = now - loginDate;
                        
                        if (timeSinceLogin > 15 * 60 * 1000) { // 15 minutes
                            console.log('Session expired, clearing data...');
                            localStorage.removeItem('authToken');
                            localStorage.removeItem('currentUser');
                            localStorage.removeItem('loginTime');
                            localStorage.removeItem('lastActivityTime');
                            document.body.style.opacity = '1';
                            return;
                        }
                    }
                    
                    // Verify it's valid JSON
                    const user = JSON.parse(currentUser);
                    console.log('Already logged in as:', user.username);
                    
                    // Redirect to requested page
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    
                    // Default to home.html, not members.html
                    const targetPage = redirect || 'home.html';
                    console.log('Redirecting to:', targetPage);
                    
                    // Redirect immediately
                    window.location.replace(targetPage);
                    return; // Exit early, don't show login form
                }
            } catch (e) {
                console.error('Error checking auth:', e);
                // Invalid data in localStorage, clear it
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
                localStorage.removeItem('loginTime');
                localStorage.removeItem('lastActivityTime');
            }

            // Show login form if not redirecting
            document.body.style.opacity = '1';
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await login();
        });

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerHTML = '&#128584;'; // See-no-evil monkey
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerHTML = '&#128065;'; // Eye
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const loginBtn = document.getElementById('loginBtn');
            const loginForm = document.getElementById('loginForm');

            // Hide error message
            errorMessage.classList.remove('show');

            // Show loading state
            loginForm.style.display = 'none';
            loadingIndicator.classList.add('show');
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${apiUrl}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store token and user info
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('loginTime', new Date().toISOString());
                    localStorage.setItem('lastActivityTime', new Date().toISOString());

                    // Small delay to ensure storage is complete
                    await new Promise(resolve => setTimeout(resolve, 100));

                    // Redirect to requested page or home page
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || 'home.html';
                    window.location.replace(redirect); // Use replace to prevent back button loop
                } else {
                    // Show error message
                    errorMessage.textContent = data.message || 'Login failed. Please check your credentials.';
                    errorMessage.classList.add('show');

                    // Reset form
                    loginForm.style.display = 'block';
                    loadingIndicator.classList.remove('show');
                    loginBtn.disabled = false;

                    // Clear password field
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Unable to connect to the server. Please try again.';
                errorMessage.classList.add('show');

                // Reset form
                loginForm.style.display = 'block';
                loadingIndicator.classList.remove('show');
                loginBtn.disabled = false;
            }
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                login();
            }
        });
    </script>
</body>
</html>
