<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status - Member Administration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #000;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .status-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        .status-icon {
            font-size: 32px;
            min-width: 40px;
            text-align: center;
        }

        .status-info {
            flex: 1;
        }

        .status-label {
            font-weight: 600;
            font-size: 15px;
            color: #000;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 13px;
            color: #666;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-error {
            background: #ffebee;
            color: #d32f2f;
        }

        .badge-warning {
            background: #fff3e0;
            color: #f57c00;
        }

        .badge-pending {
            background: #e3f2fd;
            color: #1976d2;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #000;
            color: white;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #000;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .code-block {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin: 15px 0;
            border-left: 4px solid #000;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>?? System Status</h1>
        <p>Real-time health check for Member Administration application</p>

        <div class="status-grid" id="statusGrid">
            <div class="status-item">
                <div class="status-icon">?</div>
                <div class="status-info">
                    <div class="status-label">Checking system status...</div>
                    <div class="status-value">Please wait</div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="location.reload()">?? Refresh Status</button>
            <a href="members.html" class="btn btn-secondary">?? Go to Members</a>
            <a href="home.html" class="btn btn-secondary">?? Go to Home</a>
        </div>
    </div>

    <script>
        const API_URL = '/api/members';

        document.addEventListener('DOMContentLoaded', async () => {
            await checkSystemStatus();
        });

        async function checkSystemStatus() {
            const statusGrid = document.getElementById('statusGrid');
            const checks = [];

            // Check 1: API Connectivity
            const apiCheck = await checkAPI();
            checks.push(apiCheck);

            // Check 2: Database Connection
            const dbCheck = await checkDatabase();
            checks.push(dbCheck);

            // Check 3: Member Count
            const memberCheck = await checkMembers();
            checks.push(memberCheck);

            // Render results
            renderStatus(checks);
        }

        async function checkAPI() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    return {
                        name: 'API Connectivity',
                        icon: '?',
                        status: 'success',
                        message: 'API is responding correctly',
                        details: `Status: ${response.status} OK`
                    };
                } else {
                    return {
                        name: 'API Connectivity',
                        icon: '??',
                        status: 'warning',
                        message: 'API returned an error',
                        details: `Status: ${response.status}`
                    };
                }
            } catch (error) {
                return {
                    name: 'API Connectivity',
                    icon: '?',
                    status: 'error',
                    message: 'Cannot connect to API',
                    details: 'Application may not be running. Press F5 in Visual Studio.',
                    action: 'Start Application'
                };
            }
        }

        async function checkDatabase() {
            try {
                const response = await fetch(`${API_URL}/debug`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.databaseConnected) {
                        return {
                            name: 'Database Connection',
                            icon: '?',
                            status: 'success',
                            message: 'Database is connected',
                            details: `SQL Server LocalDB - Connection OK`
                        };
                    } else {
                        return {
                            name: 'Database Connection',
                            icon: '?',
                            status: 'error',
                            message: 'Database connection failed',
                            details: 'Check SQL Server LocalDB status'
                        };
                    }
                } else {
                    return {
                        name: 'Database Connection',
                        icon: '??',
                        status: 'warning',
                        message: 'Cannot check database',
                        details: 'Debug endpoint not accessible'
                    };
                }
            } catch (error) {
                return {
                    name: 'Database Connection',
                    icon: '?',
                    status: 'error',
                    message: 'Cannot check database',
                    details: 'API not responding'
                };
            }
        }

        async function checkMembers() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const members = await response.json();
                    return {
                        name: 'Member Data',
                        icon: '??',
                        status: 'success',
                        message: `Found ${members.length} member(s)`,
                        details: members.length === 0 ? 'Database is empty - ready for new members' : `Database has ${members.length} member records`
                    };
                } else {
                    return {
                        name: 'Member Data',
                        icon: '??',
                        status: 'warning',
                        message: 'Cannot load members',
                        details: `API returned status: ${response.status}`
                    };
                }
            } catch (error) {
                return {
                    name: 'Member Data',
                    icon: '?',
                    status: 'error',
                    message: 'Cannot load members',
                    details: 'API not responding'
                };
            }
        }

        function renderStatus(checks) {
            const statusGrid = document.getElementById('statusGrid');

            const allSuccess = checks.every(check => check.status === 'success');
            const hasError = checks.some(check => check.status === 'error');

            let html = '';

            checks.forEach(check => {
                const badgeClass = `badge-${check.status}`;
                html += `
                    <div class="status-item">
                        <div class="status-icon">${check.icon}</div>
                        <div class="status-info">
                            <div class="status-label">${check.name}</div>
                            <div class="status-value">${check.message}</div>
                            <div class="status-value" style="margin-top: 4px; font-size: 12px;">${check.details}</div>
                        </div>
                        <span class="status-badge ${badgeClass}">${check.status}</span>
                    </div>
                `;
            });

            // Add summary
            if (allSuccess) {
                html += `
                    <div class="status-item" style="background: #e8f5e9; border-color: #2e7d32;">
                        <div class="status-icon">??</div>
                        <div class="status-info">
                            <div class="status-label">System Ready!</div>
                            <div class="status-value">All systems operational. You can start using the application.</div>
                        </div>
                    </div>
                `;
            } else if (hasError) {
                html += `
                    <div class="status-item" style="background: #ffebee; border-color: #d32f2f;">
                        <div class="status-icon">??</div>
                        <div class="status-info">
                            <div class="status-label">Action Required</div>
                            <div class="status-value">Please fix the errors above before using the application.</div>
                            <div class="code-block" style="margin-top: 10px;">
                                <strong>Quick Fix:</strong><br>
                                1. Open Visual Studio<br>
                                2. Press F5 to start debugging<br>
                                3. Wait for "Now listening on: https://localhost:7223"<br>
                                4. Refresh this page
                            </div>
                        </div>
                    </div>
                `;
            }

            statusGrid.innerHTML = html;
        }
    </script>
</body>
</html>
