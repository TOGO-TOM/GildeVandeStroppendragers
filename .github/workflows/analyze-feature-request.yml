name: Analyze Feature Request

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Feature request ID'
        required: true
      title:
        description: 'Feature request title'
        required: true
      description:
        description: 'Feature request description'
        required: true
      submitted_by:
        description: 'Username who submitted the request'
        required: true

permissions:
  models: read

env:
  APP_BASE_URL: 'https://app-gilde-prod.azurewebsites.net'

jobs:
  analyze:
    name: AI Analysis Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: "Agent 1 — Request Analyzer"
        id: agent1
        uses: actions/github-script@v7
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          INPUT_TITLE: ${{ github.event.inputs.title }}
          INPUT_DESCRIPTION: ${{ github.event.inputs.description }}
        with:
          script: |
            const title = process.env.INPUT_TITLE;
            const description = process.env.INPUT_DESCRIPTION;

            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.MODELS_TOKEN}`
              },
              body: JSON.stringify({
                model: "gpt-4o",
                messages: [
                  {
                    role: "system",
                    content: "You are a request analyst for a member administration web application (.NET Razor Pages). Analyze the feature request and return a JSON object with exactly these fields: \"summary\": A clear 2-3 sentence summary of what is being requested. \"category\": One of: \"UI/UX\", \"Backend\", \"Database\", \"Security\", \"Integration\", \"Performance\", \"New Feature\", \"Bug Fix\". \"priority\": One of: \"Low\", \"Medium\", \"High\", \"Critical\". Return ONLY valid JSON, no markdown fences."
                  },
                  {
                    role: "user",
                    content: `Title: ${title}\n\nDescription: ${description}`
                  }
                ]
              })
            });

            if (!res.ok) {
              const err = await res.text();
              core.setFailed(`Agent 1 failed (${res.status}): ${err}`);
              return;
            }

            const data = await res.json();
            const content = data.choices[0].message.content.trim();
            console.log("Agent 1 raw output:", content);

            const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
            const parsed = JSON.parse(cleaned);

            core.setOutput("summary", parsed.summary);
            core.setOutput("category", parsed.category);
            core.setOutput("priority", parsed.priority);

      - name: "Agent 2 — Feasibility & Architecture Planner"
        id: agent2
        uses: actions/github-script@v7
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          INPUT_TITLE: ${{ github.event.inputs.title }}
          INPUT_DESCRIPTION: ${{ github.event.inputs.description }}
          AGENT1_SUMMARY: ${{ steps.agent1.outputs.summary }}
          AGENT1_CATEGORY: ${{ steps.agent1.outputs.category }}
          AGENT1_PRIORITY: ${{ steps.agent1.outputs.priority }}
        with:
          script: |
            const title = process.env.INPUT_TITLE;
            const description = process.env.INPUT_DESCRIPTION;
            const summary = process.env.AGENT1_SUMMARY;
            const category = process.env.AGENT1_CATEGORY;
            const priority = process.env.AGENT1_PRIORITY;

            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.MODELS_TOKEN}`
              },
              body: JSON.stringify({
                model: "gpt-4o",
                messages: [
                  {
                    role: "system",
                    content: "You are a senior .NET architect reviewing feature requests for a Razor Pages web application. The tech stack is: .NET 10, Razor Pages, EF Core with SQL Server, MailKit, Azure Blob Storage, custom session-based auth with role hierarchy (Super Admin > Admin > Member Editor/Viewer > Stock Editor/Viewer). Given the analyzed request, produce a JSON object with exactly these fields: \"feasibility\": A paragraph assessing feasibility. \"architecture\": A detailed architectural plan in Markdown with sections: ## Affected Components, ## Data Model Changes, ## Implementation Steps, ## Security Considerations, ## Estimated Effort (Small/Medium/Large). Return ONLY valid JSON, no markdown fences."
                  },
                  {
                    role: "user",
                    content: `Title: ${title}\nDescription: ${description}\n\nAgent 1 Analysis:\n- Summary: ${summary}\n- Category: ${category}\n- Priority: ${priority}`
                  }
                ]
              })
            });

            if (!res.ok) {
              const err = await res.text();
              core.setFailed(`Agent 2 failed (${res.status}): ${err}`);
              return;
            }

            const data = await res.json();
            const content = data.choices[0].message.content.trim();
            console.log("Agent 2 raw output:", content);

            const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
            const parsed = JSON.parse(cleaned);

            core.setOutput("feasibility", parsed.feasibility);
            core.setOutput("architecture", parsed.architecture);

      - name: "Callback — Post results to application"
        uses: actions/github-script@v7
        env:
          WEBHOOK_SECRET: ${{ secrets.FEATURE_REQUEST_WEBHOOK_SECRET }}
          REQUEST_ID: ${{ github.event.inputs.request_id }}
          AGENT1_SUMMARY: ${{ steps.agent1.outputs.summary }}
          AGENT1_CATEGORY: ${{ steps.agent1.outputs.category }}
          AGENT1_PRIORITY: ${{ steps.agent1.outputs.priority }}
          AGENT2_FEASIBILITY: ${{ steps.agent2.outputs.feasibility }}
          AGENT2_ARCHITECTURE: ${{ steps.agent2.outputs.architecture }}
        with:
          script: |
            const requestId = process.env.REQUEST_ID;
            const url = `${process.env.APP_BASE_URL}/api/feature-requests/${requestId}/analysis-result`;

            const body = {
              analysisSummary: process.env.AGENT1_SUMMARY,
              category: process.env.AGENT1_CATEGORY,
              priority: process.env.AGENT1_PRIORITY,
              feasibilityAssessment: process.env.AGENT2_FEASIBILITY,
              architecturalPlan: process.env.AGENT2_ARCHITECTURE
            };

            console.log("Posting callback to:", url);
            console.log("Payload keys:", Object.keys(body));

            const response = await fetch(url, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Webhook-Secret': process.env.WEBHOOK_SECRET || ''
              },
              body: JSON.stringify(body)
            });

            if (!response.ok) {
              const text = await response.text();
              core.setFailed(`Callback failed (${response.status}): ${text}`);
            } else {
              console.log(`Results posted to request ${requestId}`);
            }
