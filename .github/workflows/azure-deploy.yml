name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'app-gilde-prod'
  AZURE_RESOURCE_GROUP: 'rg-gilde-prod'
  PROJECT_PATH: 'AdminMembers.csproj'
  PUBLISH_PATH: './publish'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Zip publish output
        run: cd ${{ env.PUBLISH_PATH }} && zip -r ../publish.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: publish.zip
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply pending DB migrations
        run: |
          # Get AAD token for Azure SQL REST API
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken --output tsv)
          SUBSCRIPTION_ID=$(az account show --query id --output tsv)

          # Use Azure SQL REST API to run idempotent migration SQL Ś no firewall or password needed
          SQL_PAYLOAD=$(cat <<'SQLEOF'
IF NOT EXISTS (SELECT 1 FROM sys.columns WHERE object_id = OBJECT_ID('CustomFields') AND name = 'IsFilterable')
    ALTER TABLE [CustomFields] ADD [IsFilterable] bit NOT NULL DEFAULT CAST(0 AS bit);
IF NOT EXISTS (SELECT 1 FROM [__EFMigrationsHistory] WHERE [MigrationId] = '20260402101122_AddCustomFieldIsFilterable')
    INSERT INTO [__EFMigrationsHistory] VALUES ('20260402101122_AddCustomFieldIsFilterable','8.0.0');
IF NOT EXISTS (SELECT 1 FROM sys.columns WHERE object_id = OBJECT_ID('Users') AND name = 'PasswordResetToken')
BEGIN
    ALTER TABLE [Users] ADD [PasswordResetToken] nvarchar(max) NULL;
    ALTER TABLE [Users] ADD [PasswordResetTokenExpiry] datetime2 NULL;
END
IF NOT EXISTS (SELECT 1 FROM [__EFMigrationsHistory] WHERE [MigrationId] = '20260331141557_AddPasswordResetToken')
    INSERT INTO [__EFMigrationsHistory] VALUES ('20260331141557_AddPasswordResetToken','8.0.0');
SQLEOF
          )

          BODY=$(jq -n --arg sql "$SQL_PAYLOAD" '{"commandText": $sql}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://management.azure.com/subscriptions/$SUBSCRIPTION_ID/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.Sql/servers/sql-gilde-prod/databases/AdminMembersDb/query?api-version=2014-04-01" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY_RESP=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY_RESP"
          echo "HTTP status: $HTTP_STATUS"

          # REST API returns 200 or 202 on success
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "202" && "$HTTP_STATUS" != "2"* ]]; then
            echo "Migration API call failed Ś falling back, app will retry on startup"
          else
            echo "Migrations applied successfully via REST API"
          fi

      - name: Deploy zip to App Service
        run: |
          az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --src-path publish.zip \
            --type zip \
            --async false

      - name: Enable App Service logging
        run: |
          az webapp log config \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --application-logging filesystem \
            --level information \
            --web-server-logging filesystem

      - name: Health check
        run: |
          echo "Waiting for app to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-redirs 5 https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/Login)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "Health check failed with status $STATUS Ś fetching Azure logs..."
            az webapp log download \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --log-file app_logs.zip || true
            unzip -p app_logs.zip || true
            exit 1
          fi
          echo "Health check passed with status $STATUS."

      - name: Deployment summary
        run: |
          echo "### Deployment successful" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
