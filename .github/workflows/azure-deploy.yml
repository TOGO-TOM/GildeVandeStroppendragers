name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: 'app-gilde-prod'
  AZURE_RESOURCE_GROUP: 'rg-gilde-prod'
  PROJECT_PATH: 'AdminMembers.csproj'
  PUBLISH_PATH: './publish'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Enable stdout logging in web.config
        run: |
          sed -i 's/stdoutLogEnabled="false"/stdoutLogEnabled="true"/' ${{ env.PUBLISH_PATH }}/web.config
          cat ${{ env.PUBLISH_PATH }}/web.config

      - name: Zip publish output
        run: cd ${{ env.PUBLISH_PATH }} && zip -r ../publish.zip .

      - name: Generate idempotent migration script
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.* 2>/dev/null || true
          dotnet ef migrations script \
            --project ${{ env.PROJECT_PATH }} \
            --idempotent \
            --output migration.sql
          echo "Migration SQL generated:"
          tail -20 migration.sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: |
            publish.zip
            migration.sql
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply DB migrations
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az sql server firewall-rule create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server sql-gilde-prod \
            --name github-runner \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

          # Install sqlcmd (Microsoft package)
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq mssql-tools18 unixodbc-dev

          /opt/mssql-tools18/bin/sqlcmd -C \
            -S "sql-gilde-prod.database.windows.net,1433" \
            -d "AdminMembersDb" \
            -U "sqladmin" \
            -P "${{ secrets.AZURE_SQL_PASSWORD }}" \
            -i migration.sql

          az sql server firewall-rule delete \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server sql-gilde-prod \
            --name github-runner --yes || true

          echo "Migrations applied successfully."

      - name: Configure App Service for .NET 10
        run: |
          echo "Setting App Service runtime to .NET 10 (linux)..."
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --linux-fx-version "DOTNETCORE|10.0"
          echo "Runtime set to DOTNETCORE|10.0"

      - name: Deploy zip to App Service
        run: |
          az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --src-path publish.zip \
            --type zip \
            --async false


      - name: Enable App Service logging
        run: |
          az webapp log config \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --application-logging filesystem \
            --level information \
            --web-server-logging filesystem

      - name: Health check
        run: |
          echo "Waiting for app to stabilise..."
          sleep 20

          echo "--- Checking /healthz diagnostic endpoint ---"
          HEALTHZ=$(curl -s https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz)
          echo "healthz response: $HEALTHZ"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-redirs 5 https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/Login)
          echo "Login page HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 302 ]; then
            echo "Health check failed with status $STATUS — fetching Azure logs..."
            az webapp log download \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --log-file app_logs.zip || true
            unzip -p app_logs.zip 2>/dev/null || true
            exit 1
          fi
          echo "Health check passed with status $STATUS."

      - name: Deployment summary
        run: |
          echo "### Deployment successful" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
